name: Code Analysis
on: [push, pull_request]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4

            - name: Validate composer.json and composer.lock
              run: composer validate --strict

            - name: Get Composer cache directory
              id: composer-cache-dir
              run: echo "dir=$(composer config --global cache-files-dir)" >> $GITHUB_OUTPUT

            - name: Cache Composer downloads
              uses: actions/cache@v4
              with:
                  path: ${{ steps.composer-cache-dir.outputs.dir }}
                  key: ${{ runner.os }}-php8.4-composer-code-analysis-${{ hashFiles('tools/extra-composer/code-analysis/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-php8.4-composer-code-analysis-
                      ${{ runner.os }}-php8.4-composer-

            - name: Install dependencies
              run: composer update --working-dir=./tools/extra-composer/code-analysis --prefer-dist --no-progress

            - name: Cache built JS assets
              id: assets-cache
              uses: actions/cache@v4
              with:
                  path: assets/js
                  key: ${{ runner.os }}-assets-${{ hashFiles('package-lock.json', 'webpack.config.js', 'template/js/**') }}

            - name: Setup Node
              if: steps.assets-cache.outputs.cache-hit != 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Build JS assets
              if: steps.assets-cache.outputs.cache-hit != 'true'
              run: npm ci && npm run build

            - name: Cache PHPCS results
              uses: actions/cache@v4
              with:
                  path: tools/tmp
                  key: ${{ runner.os }}-phpcs-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-phpcs-

            - name: PSR12 Code Standards
              run: composer run-script phpcs .

            - name: WordPress Plugin Compliance
              run: composer run-script plugin-check .

            - name: Cache PHPStan results
              uses: actions/cache@v4
              with:
                  path: /tmp/phpstan
                  key: ${{ runner.os }}-phpstan-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-phpstan-

            - name: PHPStan Static Analysis
              run: composer run-script phpstan
